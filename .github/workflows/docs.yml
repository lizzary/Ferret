name: Generate & Deploy Docs

on:
  push:
    branches: [master]

permissions:
  contents: write   # 允许推送回 master 分支

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拉取完整历史，避免推送冲突

      # ───────── 1. 前端文档 (TypeDoc → HTML) ─────────
      # 后续添加

      # ───────── 2. 主节点文档 (Go + doc2go) ─────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate Master Node Docs (doc2go)
        run: |
          cd packages/master-node

          # 如果你的 go.mod 的 module 声明不是 github.com/... 的路径，需要修正
          # 否则 doc2go 生成的文档内链接可能不正确，这里根据仓库名动态修正
          MODULE="github.com/${{ github.repository }}/packages/master-node"
          echo "Using module path: ${MODULE}"
          sed -i "s|^module .*|module ${MODULE}|" go.mod

          # 安装 doc2go
          go install github.com/abhinav/doc2go@latest

          # 生成文档，输出到仓库根目录下的 docs/master-node
          doc2go -out ../../docs/master-node .

      # ───────── 3. 计算节点文档 (Rust + cargo doc) ─────────
      # 后续添加

      # ───────── 4. 创建导航首页 ─────────
      - name: Create index.html for navigation
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head><meta charset="UTF-8"/><title>Search Engine Docs</title>...</head>
          <body>
            <h1>📖 Search Engine Documentation</h1>
            <ul>
              <li><a href="master-node/index.html">Master Node (Go / doc2go)</a></li>
            </ul>
          </body>
          </html>
          EOF

      # ───────── 5. 提交并推送到 master ─────────
      - name: Commit & Push docs to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🤖 Generate docs with doc2go [skip ci]"
          git push origin master
