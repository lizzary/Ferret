name: Generate & Deploy Docs

on:
  push:
    branches: [master]

permissions:
  contents: write   # 允许 git push 到 master

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 必须抓取完整的 git 历史，否则 git push 可能冲突
          fetch-depth: 0

      # ───────── 1. 前端文档 (TypeDoc → HTML) ─────────
      # 这里占位，后续添加

      # ───────── 2. 主节点文档 (Go + pkgsite 静态生成) ─────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate Master Node Docs
        run: |
          cd packages/master-node
          MODULE="github.com/${{ github.repository }}/packages/master-node"
          echo "Using module path: ${MODULE}"
          # 如果 go.mod 中 module 路径已经正确，可跳过 sed
          sed -i "s|^module .*|module ${MODULE}|" go.mod

          go install golang.org/x/pkgsite/cmd/pkgsite@latest
          mkdir -p ../../docs/master-node
          pkgsite -static -out=../../docs/master-node .

      # ───────── 3. 计算节点文档 (Rust + cargo doc) ─────────
      # 这里占位，后续添加

      # ───────── 4. 创建导航首页 ─────────
      - name: Create index.html for navigation
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head><meta charset="UTF-8"/><title>Search Engine Docs</title>...</head>
          <body>
            <h1>📖 Search Engine Documentation</h1>
            <ul>
              <li><a href="master-node/index.html">Master Node (Go / pkgsite)</a></li>
            </ul>
          </body>
          </html>
          EOF

      # ───────── 5. 提交并推送到 master ─────────
      - name: Commit & Push docs to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加 docs 目录
          git add docs/
          
          # 若没有变化则跳过
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "🤖 Generate docs [skip ci]"
          git push origin master
