name: Generate & Deploy Docs

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───────── 1. 前端文档 (TypeDoc → HTML) ─────────
      - name: Skip frontend docs
        run: echo "Frontend docs not generated yet"

      # ───────── 2. 主节点文档 (Go / pkgsite → 静态镜像) ─────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'   # 根据你的 go.mod 调整

      - name: Install pkgsite
        run: go install golang.org/x/pkgsite/cmd/pkgsite@latest

      - name: Generate master-node docs
        run: |
          mkdir -p docs/master-node
          cd packages/master-node

          # 启动 pkgsite
          pkgsite -http=:8080 &
          PKGSITE_PID=$!

          # 等待服务启动
          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:8080; then
              break
            fi
            sleep 1
          done

          # 镜像站点，转换链接，不保留主机名目录
          wget -r -l inf -p -k -np -nH --cut-dirs=0 \
            -P ../../docs/master-node \
            http://localhost:8080/

          # 关闭 pkgsite
          kill $PKGSITE_PID 2>/dev/null

      # ───────── 3. 计算节点文档 (Rust + cargo doc) ─────────
      - name: Skip compute-node docs
        run: echo "Compute node docs not generated yet"

      # ───────── 4. 创建导航首页 ─────────
      - name: Create index.html for navigation
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Search Engine Docs</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 60px auto; }
              h1   { border-bottom: 2px solid #eee; padding-bottom: 8px; }
              li   { margin: 12px 0; font-size: 1.1rem; }
              a    { color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>📖 Search Engine Documentation</h1>
            <ul>
              <!-- 其他文档暂未生成，用时取消注释即可 -->
              <!-- <li><a href="frontend/index.html">Frontend (React / TypeDoc)</a></li> -->
              <li><a href="master-node/index.html">Master Node (Go / pkgsite)</a></li>
              <!-- <li><a href="compute-node/index.html">Compute Node (Rust / cargo doc)</a></li> -->
            </ul>
          </body>
          </html>
          EOF

      # ───────── 5. 部署到 GitHub Pages ─────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false