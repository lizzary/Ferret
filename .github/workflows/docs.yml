name: Generate & Deploy Docs

on:
  push:
    branches: [master]

permissions:
  contents: write   # 允许写入 gh-pages 分支

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───────── 1. 前端文档 (TypeDoc → HTML) ─────────
      # 占位

      # ───────── 2. 主节点文档 (doc2go) ─────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate Master Node Docs
        run: |
          cd packages/master-node
          MODULE="github.com/${{ github.repository }}/packages/master-node"
          echo "Using module path: ${MODULE}"
          sed -i "s|^module .*|module ${MODULE}|" go.mod
          go install go.abhg.dev/doc2go@latest
          doc2go -out ../../docs/master-node .

      # ───────── 3. 计算节点文档 (Rust + cargo doc) ─────────
      # 占位

      # ───────── 4. 创建导航首页 ─────────
      - name: Create index.html for navigation
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head><meta charset="UTF-8"/><title>Search Engine Docs</title></head>
          <body>
            <h1>📖 Search Engine Documentation</h1>
            <ul>
              <li><a href="master-node/index.html">Master Node (Go / doc2go)</a></li>
            </ul>
          </body>
          </html>
          EOF

      # ───────── 5. 部署到 gh-pages 分支 ─────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: false
