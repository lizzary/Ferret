name: Generate & Deploy Docs

on:
  push:
    branches: [master]

permissions:
  contents: write   # peaceiris/actions-gh-pages 需要写权限
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───────── 1. 前端文档 (TypeDoc → HTML) ─────────


      # ───────── 2. 主节点文档 (Go + pkgsite 静态抓取) ─────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'   # 注意: 1.26 尚不存在，保持与 go.mod 一致

      - name: Generate Master Node Docs
        run: |
          cd packages/master-node
          go install golang.org/x/pkgsite/cmd/pkgsite@latest

          # 从 go.mod 读取模块路径，例如 github.com/you/search-engine/packages/master-node
          MODULE=$(go list -m)

          # 后台启动 pkgsite 本地服务器
          pkgsite -http=:8080 &
          PKGSITE_PID=$!
          # 等待服务就绪

          for i in {1..30}; do
            curl -sf http://localhost:8080/${MODULE} > /dev/null && break
            sleep 1
          done

          mkdir -p ../../docs/master-node
          # 递归抓取为可离线浏览的静态 HTML
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               --directory-prefix=../../docs/master-node \
               http://localhost:8080/${MODULE}

          kill $PKGSITE_PID 2>/dev/null || true

      # ───────── 3. 计算节点文档 (Rust + cargo doc) ─────────


      # ───────── 4. 创建导航首页 ─────────
      - name: Create index.html for navigation
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Search Engine Docs</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 60px auto; }
              h1   { border-bottom: 2px solid #eee; padding-bottom: 8px; }
              li   { margin: 12px 0; font-size: 1.1rem; }
              a    { color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>📖 Search Engine Documentation</h1>
            <ul>
              <li><a href="master-node/index.html">Master Node (Go / pkgsite)</a></li>
            </ul>
          </body>
          </html>
          EOF

      # ───────── 5. 部署到 GitHub Pages ─────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          # 保留上一次部署的文件（三个目录独立更新时有用）
          keep_files: false